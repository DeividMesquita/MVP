<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alunos Cadastrados — Sistema Acadêmico</title>
  <meta name="description" content="Lista de alunos cadastrados no sistema." />
  <link rel="stylesheet" href="assets/css/reset.css" />
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/listagem.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="header__logo" aria-label="Página inicial">
        <span class="header__logo-mark">SA</span>
        <span class="header__logo-text">Sistema Acadêmico</span>
      </a>
      <nav class="header__menu" aria-label="Navegação principal">
        <a class="header__link" href="index.html">Home</a>
        <a class="header__link" href="cadastro.html">Cadastro</a>
        <a class="header__link header__link--active" href="listagem.html">Alunos</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="page" aria-labelledby="page-title">
      <div class="page__header page__header--row">
        <div>
          <h1 class="page__title" id="page-title">Alunos Cadastrados</h1>
          <p class="page__subtitle">Consulte, edite ou remova os registros salvos.</p>
        </div>
        <a class="button button--primary" href="cadastro.html">Novo aluno</a>
      </div>

      <div class="alert alert--hidden" id="alert" role="status" aria-live="polite"></div>

      <div class="table-wrapper" id="table-wrapper">
        <table class="table" aria-label="Alunos cadastrados">
          <thead class="table__head">
            <tr class="table__row">
              <th class="table__cell table__cell--head">Nome</th>
              <th class="table__cell table__cell--head">Matrícula</th>
              <th class="table__cell table__cell--head">Curso</th>
              <th class="table__cell table__cell--head">E-mail</th>
              <th class="table__cell table__cell--head">Telefone</th>
              <th class="table__cell table__cell--head table__cell--actions">Ações</th>
            </tr>
          </thead>
          <tbody class="table__body" id="table-body"></tbody>
        </table>
      </div>

      <p class="empty empty--hidden" id="empty-state">
        Nenhum aluno cadastrado até o momento.
      </p>
    </section>

    <dialog class="modal" id="edit-modal" aria-labelledby="edit-title">
      <form class="form" id="edit-form" method="dialog" novalidate>
        <h2 class="modal__title" id="edit-title">Editar aluno</h2>
        <input type="hidden" id="edit-id" />

        <div class="form__group">
          <label class="form__label" for="edit-name">Nome completo</label>
          <input class="form__input" type="text" id="edit-name" required />
          <span class="form__error" id="edit-name-error"></span>
        </div>
        <div class="form__group">
          <label class="form__label" for="edit-registration">Matrícula</label>
          <input class="form__input" type="text" id="edit-registration" required />
          <span class="form__error" id="edit-registration-error"></span>
        </div>
        <div class="form__group">
          <label class="form__label" for="edit-course">Curso</label>
          <input class="form__input" type="text" id="edit-course" required />
          <span class="form__error" id="edit-course-error"></span>
        </div>
        <div class="form__group">
          <label class="form__label" for="edit-email">E-mail</label>
          <input class="form__input" type="email" id="edit-email" required />
          <span class="form__error" id="edit-email-error"></span>
        </div>
        <div class="form__group">
          <label class="form__label" for="edit-phone">Telefone</label>
          <input class="form__input" type="tel" id="edit-phone" required />
          <span class="form__error" id="edit-phone-error"></span>
        </div>

        <div class="form__actions">
          <button type="submit" class="button button--primary">Salvar alterações</button>
          <button type="button" class="button button--secondary" id="edit-cancel">Cancelar</button>
        </div>
      </form>
    </dialog>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__text">© <span id="year"></span> Sistema Acadêmico — MVP em Vanilla JS.</p>
    </div>
  </footer>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/list.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
